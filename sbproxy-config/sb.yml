# Agentic Security Demo sbproxy config.
#
# OSS sbproxy enforces agent detection, Web Bot Auth, and agent-budget
# throttling. The mock origin emits deterministic audit rows for AP2
# replay and MCP prompt-linkage so this public artifact runs without
# private enterprise images.

proxy:
  http_bind_port: 8080
  admin:
    enabled: true
    port: 9090

  trusted_proxies:
    - 172.16.0.0/12

  extensions:
    upstream:
      allow_private_cidrs:
        - 172.16.0.0/12
    agent_detect:
      enabled: true
      rule_pack_path: /etc/sbproxy/baseline.adrf.yaml

  observability:
    log:
      custom_fields:
        - name: demo_trust_tier
          value: "${request.header.x-demo-trust-tier}"

access_log:
  enabled: true
  output:
    type: file
    path: /var/log/sbproxy/access.jsonl
    max_size_mb: 25
    max_backups: 2
  capture_headers:
    request:
      - user-agent
      - signature-agent
      - signature-input
      - x-stainless-arch
      - x-demo-trust-tier

origins:
  "demo.local":
    action:
      type: proxy
      url: http://mock-origin:3000
    policies:
      - type: agent_budget
        requests_per_minute: 10
        burst: 5
        on_exceed: deny
        on_anonymous: shared

  "botauth.demo.local":
    action:
      type: proxy
      url: http://mock-origin:3000
    authentication:
      type: bot_auth
      clock_skew_seconds: 60
      agents:
        - name: openai-operator
          key_id: demo-signer-1
          algorithm: ed25519
          public_key: d75a980182b10ab7d54bfed3c964073a0ee172f3daa62325af021a68f707511a
          required_components:
            - "@method"
            - "@path"
            - "@authority"
            - date

  "ap2.demo.local":
    action:
      type: proxy
      url: http://mock-origin:3000

  "audit.demo.local":
    action:
      type: proxy
      url: http://mock-origin:3000
