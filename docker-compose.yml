# Agentic Security Demo: full stack for the 6 scenarios in
# scripts/walkthrough.sh. Brings up the proxy, its required state,
# a mock origin, optional client services, and a metrics/readiness
# endpoint. The walkthrough runs the clients from the host via uv.
#
# Tunables:
#   SBPROXY_VERSION        public sbproxy release tag (default v1.1.0)
#   DEMO_NAMESPACE         compose project name (default `agentic-demo`)

name: agentic-demo

services:
  sbproxy:
    build:
      context: ./sbproxy-image
      args:
        SBPROXY_VERSION: ${SBPROXY_VERSION:-v1.1.0}
    image: agentic-demo-sbproxy:${SBPROXY_VERSION:-v1.1.0}
    container_name: agentic-demo-sbproxy
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-origin:
        condition: service_started
    environment:
      # Tell the proxy where its state lives.
      DATABASE_URL: postgres://sbproxy:demo@postgres/sbproxy
      REDIS_URL: redis://redis:6379/0
      RUST_LOG: info,sbproxy=info,sbproxy_modules=info
    command:
      - serve
      - -f
      - /etc/sbproxy/sb.yml
    ports:
      - "127.0.0.1:8080:8080"   # proxy data plane
    volumes:
      - ./sbproxy-config:/etc/sbproxy:ro
      - demo-logs:/var/log/sbproxy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/readyz"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres:
    image: postgres:16-alpine
    container_name: agentic-demo-postgres
    environment:
      POSTGRES_USER: sbproxy
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: sbproxy
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sbproxy -d sbproxy"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: agentic-demo-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  mock-origin:
    # Tiny Flask server that echoes the inbound request as JSON,
    # stands in for the protected API the agents are calling.
    # Built from mock-origin/Dockerfile so the demo does not pull
    # an external image for the upstream.
    build:
      context: ./mock-origin
    container_name: agentic-demo-mock-origin
    volumes:
      - demo-logs:/var/log/sbproxy
    expose:
      - "3000"

  claude-code-client:
    image: python:3.12-alpine
    profiles: ["clients"]
    working_dir: /demo
    volumes:
      - .:/demo:ro
    command: ["python", "clients/claude_code_like.py", "http://sbproxy:8080/anything"]
    depends_on:
      sbproxy:
        condition: service_healthy

  unsigned-scraper:
    image: python:3.12-alpine
    profiles: ["clients"]
    working_dir: /demo
    volumes:
      - .:/demo:ro
    command: ["python", "clients/unsigned_scraper.py", "http://sbproxy:8080/anything"]
    depends_on:
      sbproxy:
        condition: service_healthy

volumes:
  demo-logs:
  postgres-data:
