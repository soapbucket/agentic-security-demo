name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - name: Validate demo artifact
        run: ./scripts/verify.sh
      - name: Resolve client dependencies
        run: uv sync --locked || uv sync
